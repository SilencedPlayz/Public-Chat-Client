<html>
  <head>
    <!meta name="viewport" content="width=device-width, height=device-height, initial-scale=0.8">
    <title>Web Chat by Rex</title>
  </head>
  <link rel="stylesheet" href="./styles.css">
  <body>
    
    <div id="overlay">
      <div id="edit-usernameform">
        <p>What should we call you?</p>
        <div class="eu-field">
          <div class="euf-icon icon-user"></div>
          <div class="euf-group">
            <div class="euf-label">Username</div>
            <input id="username" class="euf-input" maxlength="20" placeholder="Enter here">
          </div>
        </div>
        
        <div class="eu-field">
          <div class="euf-icon icon-password"></div>
          <div class="euf-group">
            <div class="euf-label">Password</div>
            <input type="password" id="password" class="euf-input" maxlength="20" placeholder="Enter...">
          </div>
        </div>
        
        <div id="errortxt">Unable to connect to server, try again.</div>
        <div id="eu-btnpanel">
          <div id="eu-btn">
            <div id="loader"></div>
            <div id="login-txt">Log-in</div>
          </div>
        </div>
      </div>
      <div id="overlay-bg"></div>
    </div>
    
    <div id="header">
      <p>
        <b>Public</b>Chat<span id="author">by Rex</span>
      </p>
      <div id="side-opt">
        <div id="online-panel">
          <div id="op-icon"></div>
          <div id="op-count">--</div>
        </div>
        <div id="fullscreen" onclick="reqFS()"></div>
      </div>
    </div>
    <div id="conversation"></div>
    <div id="typeboard">
        <textarea id="input" placeholder="Message..."></textarea>
        <div class="divider-type"></div>
        <div id="btn-group">
          <div id="mic" class="btn" onclick="micStart()"></div>
          <div id="send" class="btn" onclick="send()">Send</div>
        </div>
      </div>
  </body>
  
  <script type="module" src="./firebase.js"></script>
  <script src="./script.js"></script>
</html>
